<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rhobust Engineering Limited · Admin</title>
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; background: #f5f5f5; color: #111; }
    h2, h3 { margin-top: 0; }
    input, select, textarea { display:block; margin-bottom:10px; padding:8px; width:340px; max-width:100%; }
    textarea { min-height: 90px; resize: vertical; }
    button { padding:10px 14px; margin-top:10px; cursor:pointer; }
    .feature-row, .image-row { display:flex; gap:10px; margin-bottom:8px; align-items:center; }
    .feature-row input, .image-row input { margin-bottom:0; width:340px; }
    .section { margin-top:28px; padding-top:18px; border-top:1px solid #ddd; }
    .thumbs { display:flex; gap:10px; flex-wrap:wrap; margin-top:10px; }
    .thumbs img { width:120px; height:90px; object-fit:cover; border:1px solid #ccc; background:#fff; }
    .muted { color:#666; font-size:13px; margin-bottom:8px; }
    .actions { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .inline-note { font-size:13px; color:#666; margin-top:4px; margin-bottom:8px; }
  </style>
</head>
<body>
  <h2>Rhobust Engineering Limited · Admin</h2>

  <div class="section" style="border-top:none; padding-top:0;">
    <h3>Bike Editor</h3>
    <select id="bikeSelect"></select>
    <div class="actions">
      <button type="button" id="createBikeBtn">+ Add New Bike</button>
      <button type="button" id="reloadBtn">Reload Bikes</button>
    </div>

    <input id="model" placeholder="Model" />
    <input id="category" placeholder="Category" />
    <input id="unitPrice" type="number" step="0.01" placeholder="Default Price" />
  </div>

  <div class="section">
    <h3>Specs</h3>
    <input id="engine" placeholder="Engine" />
    <input id="displacement" placeholder="Displacement" />
    <input id="power_hp" placeholder="Power / HP" />
    <input id="torque" placeholder="Torque" />
    <input id="fuel_system" placeholder="Fuel System" />
    <input id="transmission" placeholder="Transmission" />
    <input id="throttle_type" placeholder="Throttle Type" />
    <input id="fuel_capacity" placeholder="Fuel Capacity" />
    <input id="abs" placeholder="ABS" />
    <input id="traction_control" placeholder="Traction Control" />
    <input id="headlight" placeholder="Headlight" />
    <input id="charging_port" placeholder="Charging Port" />
    <input id="color" placeholder="Color" />
    <input id="suspension" placeholder="Suspension" />
    <input id="brake" placeholder="Brake" />
  </div>

  <div class="section">
    <h3>Images</h3>
    <div class="muted">Upload PNG/JPG/WebP to Supabase Storage. The database will save the image URLs.</div>
    <input id="imageUpload" type="file" accept="image/png,image/jpeg,image/webp" multiple />
    <div id="imageUrlsContainer"></div>
    <button type="button" id="addImageUrlBtn">+ Add Image URL Manually</button>
    <div class="thumbs" id="imagePreviewContainer"></div>
  </div>

  <div class="section">
    <h3>Features</h3>
    <div id="featuresContainer"></div>
    <button type="button" id="addFeatureBtn">+ Add Feature</button>
  </div>

  <div class="section">
    <h3>Invoice Details</h3>
    <input id="invoiceNumber" placeholder="Leave blank for auto number" />
    <input id="invoiceDate" type="date" />
    <input id="customerName" placeholder="Customer Name" />
    <input id="customerCompany" placeholder="Customer Company" />
    <input id="customerPhone" placeholder="Customer Phone" />
    <input id="customerEmail" placeholder="Customer Email" />
    <textarea id="customerAddress" placeholder="Customer Address"></textarea>

    <input id="quantity" type="number" min="1" step="1" value="1" placeholder="Quantity" />
    <input id="invoiceUnitPrice" type="number" step="0.01" placeholder="Invoice Unit Price" />
    <input id="additionalCharges" type="number" step="0.01" value="0" placeholder="Additional Charges" />
    <input id="currency" value="USD" placeholder="Currency" />
    <input id="status" value="Draft" placeholder="Status" />

    <textarea id="invoiceNotes" placeholder="Notes"></textarea>
    <textarea id="invoiceTerms">3 years dealer-backed warranty from Rhobust Engineering Limited.
Complimentary scheduled servicing for 2 years or 20,000 km, whichever is reached first.</textarea>

    <div class="inline-note">Save the bike first if it is brand new, then save the invoice.</div>

    <div class="actions">
      <button id="saveInvoiceBtn" type="button">Save Invoice</button>
      <button id="previewInvoiceBtn" type="button">Save & Open Preview</button>
    </div>
  </div>

  <div class="section">
    <div class="actions">
      <button id="saveBtn" type="button">Save Bike</button>
    </div>
  </div>

  <script>
    const client = window.supabase.createClient(
      "https://apmfnubljrutnnignehh.supabase.co",
      "sb_publishable_zi5AnOBw_D7pl9WuhcGDug_SK0zgESg"
    );

    const BUCKET_NAME = "bike-images";
    let currentBike = null;
    let currentInvoiceId = null;

    const els = {
      bikeSelect: document.getElementById("bikeSelect"),
      model: document.getElementById("model"),
      category: document.getElementById("category"),
      unitPrice: document.getElementById("unitPrice"),
      engine: document.getElementById("engine"),
      displacement: document.getElementById("displacement"),
      power_hp: document.getElementById("power_hp"),
      torque: document.getElementById("torque"),
      fuel_system: document.getElementById("fuel_system"),
      transmission: document.getElementById("transmission"),
      throttle_type: document.getElementById("throttle_type"),
      fuel_capacity: document.getElementById("fuel_capacity"),
      abs: document.getElementById("abs"),
      traction_control: document.getElementById("traction_control"),
      headlight: document.getElementById("headlight"),
      charging_port: document.getElementById("charging_port"),
      color: document.getElementById("color"),
      suspension: document.getElementById("suspension"),
      brake: document.getElementById("brake"),
      featuresContainer: document.getElementById("featuresContainer"),
      imageUrlsContainer: document.getElementById("imageUrlsContainer"),
      imagePreviewContainer: document.getElementById("imagePreviewContainer"),
      imageUpload: document.getElementById("imageUpload"),
      saveBtn: document.getElementById("saveBtn"),
      createBikeBtn: document.getElementById("createBikeBtn"),
      reloadBtn: document.getElementById("reloadBtn"),
      addFeatureBtn: document.getElementById("addFeatureBtn"),
      addImageUrlBtn: document.getElementById("addImageUrlBtn"),
      invoiceNumber: document.getElementById("invoiceNumber"),
      invoiceDate: document.getElementById("invoiceDate"),
      customerName: document.getElementById("customerName"),
      customerCompany: document.getElementById("customerCompany"),
      customerPhone: document.getElementById("customerPhone"),
      customerEmail: document.getElementById("customerEmail"),
      customerAddress: document.getElementById("customerAddress"),
      quantity: document.getElementById("quantity"),
      invoiceUnitPrice: document.getElementById("invoiceUnitPrice"),
      additionalCharges: document.getElementById("additionalCharges"),
      currency: document.getElementById("currency"),
      status: document.getElementById("status"),
      invoiceNotes: document.getElementById("invoiceNotes"),
      invoiceTerms: document.getElementById("invoiceTerms"),
      saveInvoiceBtn: document.getElementById("saveInvoiceBtn"),
      previewInvoiceBtn: document.getElementById("previewInvoiceBtn")
    };

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/"/g, "&quot;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function slugify(value) {
      return String(value || "").trim().toLowerCase().replace(/\s+/g, "-").replace(/[^a-z0-9-_]/g, "");
    }

    function getParam(name) {
      return new URLSearchParams(window.location.search).get(name);
    }

    function todayInputValue() {
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2, "0");
      const day = String(d.getDate()).padStart(2, "0");
      return `${y}-${m}-${day}`;
    }

   
    function clearBikeForm() {
      currentBike = null;
      [
        "model","category","unitPrice","engine","displacement","power_hp","torque","fuel_system",
        "transmission","throttle_type","fuel_capacity","abs","traction_control","headlight",
        "charging_port","color","suspension","brake"
      ].forEach(k => els[k].value = "");
      els.featuresContainer.innerHTML = "";
      els.imageUrlsContainer.innerHTML = "";
      els.imagePreviewContainer.innerHTML = "";
    }

    function addFeature(value = "") {
      const div = document.createElement("div");
      div.className = "feature-row";
      div.innerHTML = `<input type="text" value="${escapeHtml(value)}" /><button type="button">X</button>`;
      div.querySelector("button").addEventListener("click", () => div.remove());
      els.featuresContainer.appendChild(div);
    }

    function getFeatures() {
      return [...els.featuresContainer.querySelectorAll("input")].map(i => i.value.trim()).filter(Boolean);
    }

    function addImageUrl(value = "") {
      const div = document.createElement("div");
      div.className = "image-row";
      div.innerHTML = `<input type="text" value="${escapeHtml(value)}" placeholder="Image URL" /><button type="button">X</button>`;
      const input = div.querySelector("input");
      const button = div.querySelector("button");
      input.addEventListener("input", renderImagePreviews);
      button.addEventListener("click", () => { div.remove(); renderImagePreviews(); });
      els.imageUrlsContainer.appendChild(div);
      renderImagePreviews();
    }

    function getImageUrls() {
      return [...els.imageUrlsContainer.querySelectorAll("input")].map(i => i.value.trim()).filter(Boolean);
    }

    function renderImagePreviews() {
      els.imagePreviewContainer.innerHTML = "";
      getImageUrls().forEach(url => {
        const img = document.createElement("img");
        img.src = url;
        img.alt = "Bike image";
        img.onerror = () => img.style.display = "none";
        els.imagePreviewContainer.appendChild(img);
      });
    }

    async function uploadSelectedImages() {
      const files = [...els.imageUpload.files];
      if (!files.length) return;
      if (!currentBike) {
        alert("Please select or create a bike first.");
        els.imageUpload.value = "";
        return;
      }

      for (const file of files) {
        const ext = (file.name.split(".").pop() || "png").toLowerCase();
        const fileName = `${currentBike.slug}/${Date.now()}-${Math.random().toString(36).slice(2)}.${ext}`;

        const { error } = await client.storage.from(BUCKET_NAME).upload(fileName, file, {
          upsert: false,
          contentType: file.type || undefined
        });

        if (error) {
          console.error("UPLOAD ERROR:", error);
          alert(`Image upload failed: ${error.message || "Unknown error"}`);
          els.imageUpload.value = "";
          return;
        }

        const { data } = client.storage.from(BUCKET_NAME).getPublicUrl(fileName);
        addImageUrl(data.publicUrl);
      }

      els.imageUpload.value = "";
    }

    async function loadBikes() {
      const { data, error } = await client.from("motorcycles").select("*").order("model", { ascending: true });
      console.log("LOAD BIKES DATA:", data);
      console.log("LOAD BIKES ERROR:", error);

      if (error) {
        console.error(error);
        alert(`Error loading bikes: ${error.message || JSON.stringify(error)}`);
        return;
      }

      els.bikeSelect.innerHTML = `<option value="">Select a bike</option>${
        (data || []).map(b => `<option value="${escapeHtml(b.slug)}">${escapeHtml(b.model || b.slug)}</option>`).join("")
      }`;

      if (!data || !data.length) {
        clearBikeForm();
        return;
      }

      if (currentBike?.slug) {
        const stillExists = data.some(b => b.slug === currentBike.slug);
        if (stillExists) {
          els.bikeSelect.value = currentBike.slug;
          await loadBike(currentBike.slug);
          return;
        }
      }

      els.bikeSelect.value = data[0].slug;
      await loadBike(data[0].slug);
    }

    async function loadBike(slug) {
      if (!slug) {
        clearBikeForm();
        return;
      }

      const { data, error } = await client.from("motorcycles").select("*").eq("slug", slug).single();
      if (error) {
        console.error(error);
        alert("Error loading bike");
        return;
      }

      currentBike = data;
      els.model.value = data.model || "";
      els.category.value = data.category || "";
      els.unitPrice.value = data.unit_price ?? "";
      if (!els.invoiceUnitPrice.value) els.invoiceUnitPrice.value = data.unit_price ?? "";

      els.engine.value = data.engine || "";
      els.displacement.value = data.displacement || "";
      els.power_hp.value = data.power_hp || "";
      els.torque.value = data.torque || "";
      els.fuel_system.value = data.fuel_system || "";
      els.transmission.value = data.transmission || "";
      els.throttle_type.value = data.throttle_type || "";
      els.fuel_capacity.value = data.fuel_capacity || "";
      els.abs.value = data.abs || "";
      els.traction_control.value = data.traction_control || "";
      els.headlight.value = data.headlight || "";
      els.charging_port.value = data.charging_port || "";
      els.color.value = data.color || "";
      els.suspension.value = data.suspension || "";
      els.brake.value = data.brake || "";

      els.featuresContainer.innerHTML = "";
      (data.features || []).forEach(addFeature);

      els.imageUrlsContainer.innerHTML = "";
      (data.image_urls || []).forEach(addImageUrl);

      renderImagePreviews();
    }

    async function saveBike() {
      if (!currentBike) {
        alert("No bike selected");
        return;
      }

      const updated = {
        model: els.model.value.trim(),
        category: els.category.value.trim(),
        unit_price: Number(els.unitPrice.value) || 0,
        engine: els.engine.value.trim(),
        displacement: els.displacement.value.trim(),
        power_hp: els.power_hp.value.trim(),
        torque: els.torque.value.trim(),
        fuel_system: els.fuel_system.value.trim(),
        transmission: els.transmission.value.trim(),
        throttle_type: els.throttle_type.value.trim(),
        fuel_capacity: els.fuel_capacity.value.trim(),
        abs: els.abs.value.trim(),
        traction_control: els.traction_control.value.trim(),
        headlight: els.headlight.value.trim(),
        charging_port: els.charging_port.value.trim(),
        color: els.color.value.trim(),
        suspension: els.suspension.value.trim(),
        brake: els.brake.value.trim(),
        features: getFeatures(),
        image_urls: getImageUrls()
      };

      const { error } = await client.from("motorcycles").update(updated).eq("slug", currentBike.slug);
      if (error) {
        console.error(error);
        alert("Save bike failed");
        return;
      }

      alert("Bike saved");
      await loadBikes();
      els.bikeSelect.value = currentBike.slug;
      await loadBike(currentBike.slug);
    }

    async function createBike() {
      const slugInput = prompt("Enter bike slug, e.g. 800nk");
      if (!slugInput) return;

      const cleanSlug = slugify(slugInput);
      if (!cleanSlug) {
        alert("Invalid slug");
        return;
      }

      const { error } = await client.from("motorcycles").insert([{
        slug: cleanSlug,
        model: "New Bike",
        category: "",
        unit_price: 0,
        features: [],
        image_urls: []
      }]);

      if (error) {
        console.error(error);
        alert("Error creating bike. Slug may already exist.");
        return;
      }

      alert("Bike created");
      await loadBikes();
      els.bikeSelect.value = cleanSlug;
      await loadBike(cleanSlug);
    }

    function getBikeSnapshot() {
      return {
        slug: currentBike?.slug || null,
        model: els.model.value.trim(),
        category: els.category.value.trim(),
        unit_price: Number(els.unitPrice.value) || 0,
        engine: els.engine.value.trim(),
        displacement: els.displacement.value.trim(),
        power_hp: els.power_hp.value.trim(),
        torque: els.torque.value.trim(),
        fuel_system: els.fuel_system.value.trim(),
        transmission: els.transmission.value.trim(),
        throttle_type: els.throttle_type.value.trim(),
        fuel_capacity: els.fuel_capacity.value.trim(),
        abs: els.abs.value.trim(),
        traction_control: els.traction_control.value.trim(),
        headlight: els.headlight.value.trim(),
        charging_port: els.charging_port.value.trim(),
        color: els.color.value.trim(),
        suspension: els.suspension.value.trim(),
        brake: els.brake.value.trim(),
        features: getFeatures(),
        image_urls: getImageUrls()
      };
    }

    function getInvoicePayload() {
      if (!currentBike) throw new Error("Please select a bike first.");

      const quantity = Number(els.quantity.value) || 1;
      const unitPrice = Number(els.invoiceUnitPrice.value || els.unitPrice.value) || 0;
      const additionalCharges = Number(els.additionalCharges.value) || 0;
      const subtotal = quantity * unitPrice;
      const total = subtotal + additionalCharges;

      return {
        invoice_number: els.invoiceNumber.value.trim() || null,
        invoice_date: els.invoiceDate.value || todayInputValue(),
        customer_name: els.customerName.value.trim(),
        customer_company: els.customerCompany.value.trim(),
        customer_phone: els.customerPhone.value.trim(),
        customer_email: els.customerEmail.value.trim(),
        customer_address: els.customerAddress.value.trim(),
        bike_slug: currentBike.slug,
        bike_model: els.model.value.trim(),
        bike_category: els.category.value.trim(),
        quantity,
        unit_price: unitPrice,
        subtotal,
        additional_charges: additionalCharges,
        total,
        currency: els.currency.value.trim() || "USD",
        status: els.status.value.trim() || "Draft",
        notes: els.invoiceNotes.value.trim(),
        terms: els.invoiceTerms.value.trim(),
        bike_snapshot: getBikeSnapshot()
      };
    }

    async function saveInvoice({ openPreview = false } = {}) {
      try {
        const payload = getInvoicePayload();
        let result;

        if (currentInvoiceId) {
          const { data, error } = await client.from("invoices").update(payload).eq("id", currentInvoiceId).select().single();
          if (error) throw error;
          result = data;
        } else {
          const { data, error } = await client.from("invoices").insert([payload]).select().single();
          if (error) throw error;
          result = data;
          currentInvoiceId = data.id;
        }

        els.invoiceNumber.value = result.invoice_number || payload.invoice_number;

        if (openPreview) {
          if (!result || !result.id) {
            alert("Invoice saved but no invoice id was returned.");
            return null;
          }
          const url = `invoice.html?id=${encodeURIComponent(result.id)}&v=${Date.now()}`;
          window.open(url, "_blank");
        } else {
          alert("Invoice saved");
        }

        return result;
      } catch (err) {
        console.error("SAVE INVOICE ERROR:", err);
        alert(err?.message || JSON.stringify(err) || "Failed to save invoice");
        return null;
      }
    }

    async function loadInvoiceIntoAdmin(invoiceId) {
      const { data, error } = await client.from("invoices").select("*").eq("id", invoiceId).single();
      if (error) {
        console.error(error);
        alert("Failed to load invoice");
        return;
      }

      currentInvoiceId = data.id;
      els.invoiceNumber.value = data.invoice_number || "";
      els.invoiceDate.value = data.invoice_date || todayInputValue();
      els.customerName.value = data.customer_name || "";
      els.customerCompany.value = data.customer_company || "";
      els.customerPhone.value = data.customer_phone || "";
      els.customerEmail.value = data.customer_email || "";
      els.customerAddress.value = data.customer_address || "";
      els.quantity.value = data.quantity ?? 1;
      els.invoiceUnitPrice.value = data.unit_price ?? "";
      els.additionalCharges.value = data.additional_charges ?? 0;
      els.currency.value = data.currency || "USD";
      els.status.value = data.status || "Draft";
      els.invoiceNotes.value = data.notes || "";
      els.invoiceTerms.value = data.terms || "";

      if (data.bike_snapshot?.slug) {
        els.bikeSelect.value = data.bike_snapshot.slug;
        await loadBike(data.bike_snapshot.slug);
      } else if (data.bike_slug) {
        els.bikeSelect.value = data.bike_slug;
        await loadBike(data.bike_slug);
      }
    }

    els.bikeSelect.addEventListener("change", e => loadBike(e.target.value));
    els.saveBtn.addEventListener("click", saveBike);
    els.createBikeBtn.addEventListener("click", createBike);
    els.reloadBtn.addEventListener("click", loadBikes);
    els.addFeatureBtn.addEventListener("click", () => addFeature(""));
    els.addImageUrlBtn.addEventListener("click", () => addImageUrl(""));
    els.imageUpload.addEventListener("change", uploadSelectedImages);
    els.saveInvoiceBtn.addEventListener("click", () => saveInvoice({ openPreview: false }));
    els.previewInvoiceBtn.addEventListener("click", () => saveInvoice({ openPreview: true }));

    (async function initAdmin() {
      if (!els.invoiceDate.value) els.invoiceDate.value = todayInputValue();
      await loadBikes();

      const invoiceId = getParam("invoice_id") || getParam("id");
      if (invoiceId) await loadInvoiceIntoAdmin(invoiceId);
    })();
  </script>
</body>
</html>

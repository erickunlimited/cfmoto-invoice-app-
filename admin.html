<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Bike Admin</title>

  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    input, textarea, select { display:block; margin-bottom:10px; padding:8px; width:300px; }
    button { padding:10px; margin-top:10px; }
    .feature-row { display:flex; gap:10px; margin-bottom:5px; }
  </style>
</head>

<body>

<h2>Bike Editor</h2>

<button onclick="createBike()">+ Add New Bike</button>

<input id="model" placeholder="Model">
<input id="category" placeholder="Category">
<input id="unitPrice" placeholder="Price">

<h3>Specs</h3>

<input id="engine_type" placeholder="Engine Type">
<input id="displacement" placeholder="Displacement">
<input id="power" placeholder="Power">
<input id="torque" placeholder="Torque">
<input id="transmission" placeholder="Transmission">
<input id="cooling_system" placeholder="Cooling System">
<input id="seat_height" placeholder="Seat Height">
<input id="fuel_tank_capacity" placeholder="Fuel Tank Capacity">
<input id="weight" placeholder="Weight">

<input id="image_url" placeholder="Image URL">

<h3>Features</h3>
<div id="featuresContainer"></div>
<button onclick="addFeature()">+ Add Feature</button>

<br><br>
<button id="saveBtn">Save</button>

<script>
const client = window.supabase.createClient(
  "PASTE_URL",
  "PASTE_KEY"
);

let currentBike = null;

function addFeature(value = "") {
  const div = document.createElement("div");
  div.className = "feature-row";

  div.innerHTML = `
    <input value="${value}" />
    <button onclick="this.parentElement.remove()">X</button>
  `;

  document.getElementById("featuresContainer").appendChild(div);
}

function getFeatures() {
  return [...document.querySelectorAll("#featuresContainer input")]
    .map(i => i.value)
    .filter(v => v);
}

async function loadBikes() {
  const { data } = await client.from("motorcycles").select("*");

  document.getElementById("bikeSelect").innerHTML =
    data.map(b => `<option value="${b.slug}">${b.model}</option>`).join("");

  if (data.length) loadBike(data[0].slug);
}

async function loadBike(slug) {
  const { data } = await client
    .from("motorcycles")
    .select("*")
    .eq("slug", slug)
    .single();

  currentBike = data;

  model.value = data.model || "";
  category.value = data.category || "";
  unitPrice.value = data.unit_price || "";

  engine_type.value = data.engine_type || "";
  displacement.value = data.displacement || "";
  power.value = data.power || "";
  torque.value = data.torque || "";
  transmission.value = data.transmission || "";
  cooling_system.value = data.cooling_system || "";
  seat_height.value = data.seat_height || "";
  fuel_tank_capacity.value = data.fuel_tank_capacity || "";
  weight.value = data.weight || "";

  image_url.value = data.image_url || "";

  featuresContainer.innerHTML = "";
  (data.features || []).forEach(f => addFeature(f));
}

async function saveBike() {
  const updated = {
    model: model.value,
    category: category.value,
    unit_price: unitPrice.value,

    engine_type: engine_type.value,
    displacement: displacement.value,
    power: power.value,
    torque: torque.value,
    transmission: transmission.value,
    cooling_system: cooling_system.value,
    seat_height: seat_height.value,
    fuel_tank_capacity: fuel_tank_capacity.value,
    weight: weight.value,

    image_url: image_url.value,
    features: getFeatures()
  };

  await client
    .from("motorcycles")
    .update(updated)
    .eq("slug", currentBike.slug);

  alert("Saved");
  loadBikes();
}
async function createBike() {
  const slug = prompt("Enter bike slug (e.g. 800nk):");

  if (!slug) return;

  const { error } = await client.from("motorcycles").insert([
    {
      slug: slug,
      model: "New Bike",
      category: "",
      unit_price: 0,
      features: []
    }
  ]);

  if (error) {
    alert("Error creating bike (maybe slug exists)");
    console.error(error);
    return;
  }

  alert("Bike created");

  loadBikes();
}
bikeSelect.onchange = (e) => loadBike(e.target.value);
saveBtn.onclick = saveBike;

loadBikes();
</script>

</body>
</html>

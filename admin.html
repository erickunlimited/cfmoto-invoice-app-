<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bike Admin</title>

  <!-- Supabase CDN -->
  <script src="https://unpkg.com/@supabase/supabase-js@2"></script>

  <style>
    body {
      font-family: Arial;
      padding: 20px;
      background: #f5f5f5;
    }

    input, select {
      margin-bottom: 10px;
      padding: 8px;
      width: 250px;
    }

    button {
      padding: 10px 15px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h2>Bike Editor</h2>

  <label>Select Bike:</label><br>
  <select id="bikeSelect"></select><br><br>

  <label>Model:</label><br>
  <input id="model"><br><br>

  <label>Category:</label><br>
  <input id="category"><br><br>

  <label>Price:</label><br>
  <input id="unitPrice"><br><br>

  <button id="saveBtn">Save</button>

  <script>
    // 🔑 PASTE YOUR DETAILS HERE
    const SUPABASE_URL = "https://apmfnubljrutnnignehh.supabase.co";
    const SUPABASE_KEY = "sb_publishable_zi5AnOBw_D7pl9WuhcGDug_SK0zgESg";

    // ✅ Create client (NO duplicate names)
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    const bikeSelect = document.getElementById("bikeSelect");
    const saveBtn = document.getElementById("saveBtn");

    let currentBike = null;

    // 🚀 Load bikes
    async function loadBikes() {
      const { data, error } = await client
        .from("motorcycles")
        .select("*")
        .order("model", { ascending: true });

      if (error) {
        console.error(error);
        alert("Failed to load bikes");
        return;
      }

      console.log("Loaded bikes:", data);

      bikeSelect.innerHTML = data
        .map(b => `<option value="${b.slug}">${b.model}</option>`)
        .join("");

      if (data.length) {
        loadBike(data[0].slug);
      }
    }

    // 📥 Load single bike
    async function loadBike(slug) {
      const { data, error } = await client
        .from("motorcycles")
        .select("*")
        .eq("slug", slug)
        .single();

      if (error) {
        console.error(error);
        return;
      }

      currentBike = data;

      document.getElementById("model").value = data.model || "";
      document.getElementById("category").value = data.category || "";
      document.getElementById("unitPrice").value = data.unit_price || "";
    }

    // 💾 Save bike
    async function saveBike() {
      if (!currentBike) return;

      const updated = {
        model: document.getElementById("model").value,
        category: document.getElementById("category").value,
        unit_price: document.getElementById("unitPrice").value
      };

      const { error } = await client
        .from("motorcycles")
        .update(updated)
        .eq("slug", currentBike.slug);

      if (error) {
        console.error(error);
        alert("Save failed");
        return;
      }

      alert("Saved successfully");
      loadBikes();
    }

    // 🎯 Events
    bikeSelect.addEventListener("change", e => {
      loadBike(e.target.value);
    });

    saveBtn.addEventListener("click", saveBike);

    // 🚀 Start app
    loadBikes();
  </script>

</body>
</html>

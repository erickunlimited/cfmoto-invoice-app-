<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bike Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>

<body style="font-family: Arial; padding: 20px;">

  <h2>Bike Editor</h2>

  <label>Select Bike:</label><br>
  <select id="bikeSelect"></select><br><br>

  <label>Model:</label><br>
  <input id="model"><br><br>

  <label>Category:</label><br>
  <input id="category"><br><br>

  <label>Price:</label><br>
  <input id="unitPrice"><br><br>

  <button id="saveBtn">Save</button>

  <script>
    const supabase = window.supabase.createClient(
      "PASTE_YOUR_URL_HERE",
      "PASTE_YOUR_PUBLISHABLE_KEY_HERE"
    );

    const bikeSelect = document.getElementById("bikeSelect");
    const saveBtn = document.getElementById("saveBtn");

    let bikes = [];
    let currentBike = null;

    async function loadBikes() {
      const { data, error } = await supabase
        .from("motorcycles")
        .select("*")
        .order("model", { ascending: true });

      if (error) {
        alert("Error loading bikes");
        return;
      }

      bikes = data;

      bikeSelect.innerHTML = bikes
        .map(b => `<option value="${b.slug}">${b.model}</option>`)
        .join("");

      if (bikes.length) {
        loadBike(bikes[0].slug);
      }
    }

    async function loadBike(slug) {
      const { data } = await supabase
        .from("motorcycles")
        .select("*")
        .eq("slug", slug)
        .single();

      currentBike = data;

      document.getElementById("model").value = data.model || "";
      document.getElementById("category").value = data.category || "";
      document.getElementById("unitPrice").value = data.unit_price || "";
    }

    async function saveBike() {
      const updated = {
        model: document.getElementById("model").value,
        category: document.getElementById("category").value,
        unit_price: document.getElementById("unitPrice").value
      };

      await supabase
        .from("motorcycles")
        .update(updated)
        .eq("slug", currentBike.slug);

      alert("Saved!");
      loadBikes();
    }

    bikeSelect.addEventListener("change", e => {
      loadBike(e.target.value);
    });

    saveBtn.addEventListener("click", saveBike);

    loadBikes();
  </script>

</body>
</html>

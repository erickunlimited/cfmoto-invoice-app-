<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>RES Invoice v2</title>

<script src="https://unpkg.com/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#111; }
.app { display:grid; grid-template-columns:320px 1fr; }

.editor {
  background:#0d0d0d; color:white; padding:20px; height:100vh; overflow:auto;
}

.editor input, .editor textarea, .editor select {
  width:100%; margin-bottom:8px; padding:8px;
  background:#1e1e1e; color:white; border:1px solid #333;
}

.editor label {
  font-size:10px; opacity:0.6;
}

.preview {
  background:#f5f5f5; padding:20px;
}

.invoice {
  background:white;
  max-width:800px;
  margin:auto;
  padding:24px;
}

.features { display:flex; flex-wrap:wrap; gap:8px; }
.pill {
  padding:6px 12px;
  border-radius:20px;
  background:#e6f7f7;
  border:1px solid #00b4b4;
  font-size:11px;
}

.gallery img {
  width:100%;
  max-height:180px;
  object-fit:contain;
  border:1px solid #ddd;
}

.line-row {
  display:grid;
  grid-template-columns:2fr 1fr 1fr 1fr auto;
  gap:6px;
  margin-bottom:6px;
}

button { padding:10px; cursor:pointer; }
</style>
</head>

<body>
<div class="app">

<!-- EDITOR -->
<div class="editor">

<h3>Invoice Setup</h3>

<label>Status</label>
<select id="status">
  <option>DRAFT</option>
  <option>QUOTE</option>
  <option>INVOICE</option>
  <option>PAID</option>
  <option>CANCELLED</option>
</select>

<label>Invoice #</label>
<input id="inv">

<label>Date</label>
<input type="date" id="date">

<label>Expiry Date</label>
<input type="date" id="expiry">

<label>Due Date</label>
<input type="date" id="due">

<label>Balance Due Date</label>
<input type="date" id="balance_due_date">

<hr>

<h4>Customer</h4>

<input id="cust_name" placeholder="Name">
<input id="cust_contact" placeholder="Contact">
<textarea id="cust_addr" placeholder="Address"></textarea>
<input id="cust_ref" placeholder="Internal Ref">

<hr>

<h4>Bike</h4>
<select id="bike"></select>

<hr>

<h4>Line Items</h4>
<div id="lines"></div>
<button onclick="addLine()">+ Add Item</button>

<hr>

<h4>Payment</h4>

<select id="pay_status">
<option></option>
<option>UNPAID</option>
<option>DEPOSIT PAID</option>
<option>PART PAID</option>
<option>PAID IN FULL</option>
</select>

<select id="pay_method">
<option></option>
<option>CASH</option>
<option>BANK</option>
<option>MOMO</option>
<option>CARD</option>
</select>

<input id="pay_ref" placeholder="Payment Ref">
<input id="deposit" placeholder="Deposit">
<textarea id="pay_note" placeholder="Payment note"></textarea>

<hr>

<h4>Notes</h4>
<textarea id="notes"></textarea>

<button onclick="downloadPDF()">Download PDF</button>

</div>

<!-- PREVIEW -->
<div class="preview">
<div class="invoice" id="invoice">

<h2 id="o_status"></h2>
<h3 id="o_inv"></h3>

<div id="o_dates"></div>

<hr>

<h3>Customer</h3>
<div id="o_customer"></div>

<hr>

<h3 id="o_bike"></h3>
<div class="gallery" id="gallery"></div>

<div class="features" id="features"></div>

<hr>

<h3>Items</h3>
<div id="items"></div>

<hr>

<h3>Totals</h3>
<div id="totals"></div>

<hr>

<h3>Payment</h3>
<div id="payment"></div>

<hr>

<h3>Notes</h3>
<div id="o_notes"></div>

</div>
</div>

</div>

<script>

const client = supabase.createClient(
"https://apmfnubljrutnnignehh.supabase.co",
"sb_publishable_zi5AnOBw_D7pl9WuhcGDug_SK0zgESg"
);

let bikes = [];
let currentBike = null;

async function loadBikes(){
const {data}=await client.from("motorcycles").select("*");
bikes=data;
bike.innerHTML=data.map(b=>`<option value="${b.slug}">${b.model}</option>`).join("");
selectBike(data[0].slug);
}

async function selectBike(slug){
const {data}=await client.from("motorcycles").select("*").eq("slug",slug).single();
currentBike=data;
render();
}

bike.onchange=e=>selectBike(e.target.value);

function addLine(desc="",qty=1,price=0){
const div=document.createElement("div");
div.className="line-row";
div.innerHTML=`
<input placeholder="Description" value="${desc}">
<input type="number" value="${qty}">
<input type="number" value="${price}">
<div class="amt">0</div>
<button onclick="this.parentElement.remove();render()">X</button>
`;
lines.appendChild(div);
render();
}

function getLines(){
return [...lines.children].map(r=>{
const i=r.querySelectorAll("input");
return {
desc:i[0].value,
qty:Number(i[1].value),
price:Number(i[2].value)
};
});
}

function render(){

o_status.innerText=status.value;
o_inv.innerText=inv.value;

o_dates.innerText=
`DATE: ${date.value}
EXPIRY: ${expiry.value}
DUE: ${due.value}
BALANCE DUE: ${balance_due_date.value}`;

o_customer.innerText=
`${cust_name.value}
${cust_contact.value}
${cust_addr.value}
REF: ${cust_ref.value}`;

o_bike.innerText=currentBike.model;

gallery.innerHTML="";
(currentBike.image_urls||[]).slice(0,3).forEach(u=>{
gallery.innerHTML+=`<img src="${u}">`;
});

const feats=(currentBike.features||[])
.flatMap(f=>f.split(/[,.]+/))
.map(f=>f.trim())
.filter(Boolean);

features.innerHTML=feats.map(f=>`<div class="pill">${f.toUpperCase()}</div>`).join("");

const lineData=getLines();

items.innerHTML="";
let subtotal=0;

lineData.forEach(l=>{
const amt=l.qty*l.price;
subtotal+=amt;
items.innerHTML+=`${l.desc} — ${l.qty} x ${l.price} = ${amt}<br>`;
});

const dep=Number(deposit.value||0);
const total=subtotal;
const balance=total-dep;

totals.innerHTML=
`Subtotal: ${subtotal}<br>
Total: ${total}<br>
Deposit: ${dep}<br>
Balance: ${balance}`;

payment.innerText=
`Status: ${pay_status.value}
Method: ${pay_method.value}
Ref: ${pay_ref.value}
Note: ${pay_note.value}`;

o_notes.innerText=notes.value;
}

document.querySelectorAll("input,textarea,select")
.forEach(el=>el.oninput=render);

function downloadPDF(){
html2pdf().from(invoice).set({
filename: `${inv.value||"invoice"}.pdf`
}).save();
}

inv.value="RES-"+Math.floor(Math.random()*100000);
date.value=new Date().toISOString().split("T")[0];

loadBikes();

</script>

</body>
</html>
